name = "xnet-notifier"
main = "src/index.js"
compatibility_date = "2024-11-01"

# roda a cada 5 min (casa com o cache ~5min do raw do GitHub)
[triggers]
crons = ["*/5 * * * *"]

# namespace KV "xnet-hub-subs" (o MESMO que deve ser ligado ao projeto Pages com binding SUBS)
[[kv_namespaces]]
binding = "SUBS"
id = "be9b546cdfc246438db0601bf890a9ab"

[vars]
VAPID_SUBJECT = "mailto:aronpeyroteo@gmail.com"
